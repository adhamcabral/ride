services:
  proxy:
    image: nginx:1.27-alpine
    container_name: ride-proxy
    profiles:
      - https
    restart: unless-stopped
    environment:
      RIDE_TLS_CERT_FILE: ${RIDE_TLS_CERT_FILE:-ride-local.crt}
      RIDE_TLS_KEY_FILE: ${RIDE_TLS_KEY_FILE:-ride-local.key}
      RIDE_HTTPS_PORT: ${RIDE_HTTPS_PORT:-3443}
      ONLYOFFICE_HTTPS_PORT: ${ONLYOFFICE_HTTPS_PORT:-8443}
    ports:
      - "${RIDE_HTTPS_BIND_ADDRESS:-0.0.0.0}:${RIDE_HTTPS_PORT:-3443}:3443"
      - "${ONLYOFFICE_HTTPS_BIND_ADDRESS:-0.0.0.0}:${ONLYOFFICE_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./docker/proxy/templates:/etc/nginx/templates:ro
      - ./docker/proxy/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
      onlyoffice:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: docker/prod/api.Dockerfile
    image: ride/api-prod:local
    container_name: ride-api
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3333
      STORAGE_DIR: ./data
      RIDE_MIN_FREE_BYTES: ${RIDE_MIN_FREE_BYTES:-536870912}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-32mb}
      PDF_RENDER_DPI: ${PDF_RENDER_DPI:-120}
      PDF_RENDER_MAX_BUFFER_MB: ${PDF_RENDER_MAX_BUFFER_MB:-64}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://127.0.0.1:3443}
      PUBLIC_API_URL: ${DOCKER_PUBLIC_API_URL:-http://api:3333/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://127.0.0.1:3443,https://localhost:3443}
      RIDE_ACCESS_TICKET_SECRET: ${RIDE_ACCESS_TICKET_SECRET:-ride-dev-ticket-secret}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-https://127.0.0.1:8443}
      ONLYOFFICE_JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-false}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-ride-dev-secret}
      ONLYOFFICE_CALLBACK_ALLOWED_HOSTS: ${ONLYOFFICE_CALLBACK_ALLOWED_HOSTS:-onlyoffice,ride-onlyoffice,api,ride-api,127.0.0.1,localhost}
      OFFICE_CALLBACK_MAX_BYTES: ${OFFICE_CALLBACK_MAX_BYTES:-268435456}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-3333}:3333"
    volumes:
      - ./apps/api/data:/workspace/apps/api/data
      - ${RIDE_BACKUP_DIR:-./apps/api/data/backups}:/backups
    depends_on:
      onlyoffice:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/prod/web.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WEB_PORT: ${VITE_WEB_PORT:-3443}
        VITE_ONLYOFFICE_PORT: ${ONLYOFFICE_HTTPS_PORT:-8443}
        VITE_ONLYOFFICE_PROXY_TARGET: ${DOCKER_ONLYOFFICE_PROXY_TARGET:-http://onlyoffice}
    image: ride/web-prod:local
    container_name: ride-web
    restart: unless-stopped
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_HOST_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started

  onlyoffice:
    image: ${ONLYOFFICE_IMAGE:-ride/onlyoffice-documentserver:local}
    build:
      context: ./docker/onlyoffice
      dockerfile: Dockerfile
      args:
        ONLYOFFICE_BASE_IMAGE: ${ONLYOFFICE_BASE_IMAGE:-ride/onlyoffice-documentserver-base:local}
    container_name: ride-onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "${ONLYOFFICE_JWT_ENABLED:-false}"
      JWT_SECRET: "${ONLYOFFICE_JWT_SECRET:-ride-dev-secret}"
      ALLOW_PRIVATE_IP_ADDRESS: "${ONLYOFFICE_ALLOW_PRIVATE_IP:-true}"
      ALLOW_META_IP_ADDRESS: "${ONLYOFFICE_ALLOW_META_IP:-true}"
    ports:
      - "${ONLYOFFICE_BIND_ADDRESS:-127.0.0.1}:${ONLYOFFICE_PORT:-8082}:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files

volumes:
  onlyoffice-data:
  onlyoffice-logs:
  onlyoffice-cache:
