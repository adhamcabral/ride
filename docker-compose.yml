services:
  deps:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.dev
    image: ride/app-dev:local
    working_dir: /workspace
    command: sh docker/app/ensure-node-modules.sh
    restart: "no"
    volumes:
      - .:/workspace
      - ride-node-modules:/workspace/node_modules
      - ride-api-node-modules:/workspace/apps/api/node_modules
      - ride-web-node-modules:/workspace/apps/web/node_modules

  api:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.dev
    image: ride/app-dev:local
    container_name: ride-api
    working_dir: /workspace
    command: npm run dev -w @ride/api
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3333
      STORAGE_DIR: ./data
      RIDE_MIN_FREE_BYTES: ${RIDE_MIN_FREE_BYTES:-536870912}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-32mb}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://127.0.0.1:5173}
      PUBLIC_API_URL: ${DOCKER_PUBLIC_API_URL:-http://api:3333/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      RIDE_ACCESS_TICKET_SECRET: ${RIDE_ACCESS_TICKET_SECRET:-ride-dev-ticket-secret}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://127.0.0.1:8082}
      ONLYOFFICE_JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-false}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-ride-dev-secret}
      ONLYOFFICE_CALLBACK_ALLOWED_HOSTS: ${ONLYOFFICE_CALLBACK_ALLOWED_HOSTS:-onlyoffice,ride-onlyoffice,api,ride-api,127.0.0.1,localhost}
      OFFICE_CALLBACK_MAX_BYTES: ${OFFICE_CALLBACK_MAX_BYTES:-268435456}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${API_HOST_PORT:-3333}:3333"
    volumes:
      - .:/workspace
      - ride-node-modules:/workspace/node_modules
      - ride-api-node-modules:/workspace/apps/api/node_modules
      - ride-web-node-modules:/workspace/apps/web/node_modules
      - ride-api-dist:/workspace/apps/api/dist
      - ${RIDE_BACKUP_DIR:-./apps/api/data/backups}:/backups
    depends_on:
      deps:
        condition: service_completed_successfully
      onlyoffice:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.dev
    image: ride/app-dev:local
    container_name: ride-web
    working_dir: /workspace
    command: npm run dev -w @ride/web -- --host 0.0.0.0
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:3333/api}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://127.0.0.1:3333/api}
      VITE_WEB_PORT: ${VITE_WEB_PORT:-5173}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://127.0.0.1:8082}
      VITE_ONLYOFFICE_PORT: ${ONLYOFFICE_PORT:-8082}
      VITE_ONLYOFFICE_PROXY_TARGET: ${DOCKER_ONLYOFFICE_PROXY_TARGET:-http://onlyoffice}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_HOST_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - ride-node-modules:/workspace/node_modules
      - ride-api-node-modules:/workspace/apps/api/node_modules
      - ride-web-node-modules:/workspace/apps/web/node_modules
      - ride-web-svelte-kit:/workspace/apps/web/.svelte-kit
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started

  onlyoffice:
    image: ${ONLYOFFICE_IMAGE:-ride/onlyoffice-documentserver:local}
    build:
      context: ./docker/onlyoffice
      dockerfile: Dockerfile
      args:
        ONLYOFFICE_BASE_IMAGE: ${ONLYOFFICE_BASE_IMAGE:-ride/onlyoffice-documentserver-base:local}
    container_name: ride-onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "${ONLYOFFICE_JWT_ENABLED:-false}"
      JWT_SECRET: "${ONLYOFFICE_JWT_SECRET:-ride-dev-secret}"
      ALLOW_PRIVATE_IP_ADDRESS: "${ONLYOFFICE_ALLOW_PRIVATE_IP:-true}"
      ALLOW_META_IP_ADDRESS: "${ONLYOFFICE_ALLOW_META_IP:-true}"
    ports:
      - "${ONLYOFFICE_PORT:-8082}:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files

volumes:
  ride-node-modules:
  ride-api-node-modules:
  ride-web-node-modules:
  ride-api-dist:
  ride-web-svelte-kit:
  onlyoffice-data:
  onlyoffice-logs:
  onlyoffice-cache:
