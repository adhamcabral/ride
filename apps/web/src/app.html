<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafd" />
    <link rel="shortcut icon" href="/favicon.ico?v=7" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ride-favicon-32.png?v=7" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ride-favicon-256.png?v=7" />
    <link rel="apple-touch-icon" href="/ride-touch-icon.png?v=7" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (() => {
        const staleAssetKey = 'ride:stale-asset-reload';
        const isStaleAssetError = (value) => {
          const text = String(value?.message || value?.reason?.message || value?.target?.src || value?.target?.href || value || '');
          return (
            text.includes('/_app/immutable/') ||
            text.includes('Failed to fetch dynamically imported module') ||
            text.includes('Importing a module script failed') ||
            text.includes('error loading dynamically imported module')
          );
        };
        const reloadFresh = () => {
          try {
            if (sessionStorage.getItem(staleAssetKey)) return;
            sessionStorage.setItem(staleAssetKey, String(Date.now()));
            const url = new URL(location.href);
            url.searchParams.set('_ride_refresh', String(Date.now()));
            location.replace(url);
          } catch {
            location.reload();
          }
        };
        addEventListener('error', (event) => {
          if (isStaleAssetError(event)) reloadFresh();
        }, true);
        addEventListener('unhandledrejection', (event) => {
          if (isStaleAssetError(event)) reloadFresh();
        });
        addEventListener('load', () => {
          setTimeout(() => {
            try {
              sessionStorage.removeItem(staleAssetKey);
            } catch {}
          }, 8000);
        });

        try {
          const stored = localStorage.getItem('ride:appearance');
          const appearance = stored === 'dark' || stored === 'system' || stored === 'light' ? stored : 'system';
          const isDark = appearance === 'dark' || (appearance === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          const theme = isDark ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', isDark ? '#1b1b1b' : '#f8fafd');
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
