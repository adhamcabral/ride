<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafd" />
    <link rel="shortcut icon" href="/favicon.ico?v=7" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ride-favicon-32.png?v=7" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ride-favicon-256.png?v=7" />
    <link rel="apple-touch-icon" href="/ride-touch-icon.png?v=7" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('ride:appearance');
          const appearance = stored === 'dark' || stored === 'system' || stored === 'light' ? stored : 'system';
          const isDark = appearance === 'dark' || (appearance === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          const theme = isDark ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', isDark ? '#1b1b1b' : '#f8fafd');
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
